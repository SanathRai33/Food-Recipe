<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="profile-container">
        <nav class="navbar">
            <h2>My Profile</h2>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/my-favorites">Favorites</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>

        <div class="profile-content">
            <div class="profile-card">
                <h3>Profile Information</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" disabled>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" disabled>
                    </div>
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name">
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name">
                    </div>
                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dietary_preferences">Dietary Preferences</label>
                        <input type="text" id="dietary_preferences" placeholder="e.g., Vegan, Gluten-free">
                    </div>
                    <div class="form-group">
                        <label for="profile_picture">Profile Picture URL</label>
                        <input type="url" id="profile_picture" placeholder="https://example.com/photo.jpg">
                    </div>
                    <div id="updateMessage" class="success-message"></div>
                    <div id="updateError" class="error-message"></div>
                    <button type="submit">Update Profile</button>
                </form>
            </div>

            <div class="password-card">
                <h3>Change Password</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="current_password">Current Password</label>
                        <input type="password" id="current_password" required>
                    </div>
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" id="new_password" required>
                    </div>
                    <div id="passwordMessage" class="success-message"></div>
                    <div id="passwordError" class="error-message"></div>
                    <button type="submit">Change Password</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
