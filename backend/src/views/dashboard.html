<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="navbar">
            <h2>Dashboard</h2>
            <div class="nav-links">
                <a href="/profile">My Profile</a>
                <a href="/recipes">Browse Recipes</a>
                <a href="/create-recipe">Create Recipe</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/favorites">Favorites</a>
                <a href="/collections">Collections</a>
                <a href="/activity-feed">Activity Feed</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>
        <div class="profile-section">
            <h3>Welcome, <span id="userName"></span>!</h3>
            <div class="user-info">
                <p><strong>Username:</strong> <span id="displayUsername"></span></p>
                <p><strong>Email:</strong> <span id="displayEmail"></span></p>
                <p><strong>Full Name:</strong> <span id="displayFullName"></span></p>
                <p><strong>Role:</strong> <span id="displayRole"></span></p>
            </div>
            <div class="dashboard-actions">
                <a href="/profile" class="btn-primary">Edit Profile</a>
                <a href="/create-recipe" class="btn-primary">Create New Recipe</a>
                <a href="/recipes" class="btn-secondary">Browse All Recipes</a>
                <a href="/collections" class="btn-secondary">View Collections</a>
                <a href="/activity-feed" class="btn-secondary">View Activity Feed</a>
                <a href="/admin/dashboard" class="btn-admin" id="adminLink" style="display:none;">Admin Panel</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
