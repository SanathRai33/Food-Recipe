<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Ratings</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/ratings.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="ratings-page">
        <nav class="navbar">
            <h2>Recipe Ratings</h2>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/recipes">Recipes</a>
                <a href="/create-recipe">Create Recipe</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/favorites">Favorites</a>
                <a href="/collections">Collections</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>

        <div class="ratings-content">
            <div class="recipe-info" id="recipeInfo">
                <!-- Recipe info will be rendered here -->
            </div>

            <div class="rating-section">
                <div class="rating-summary" id="ratingSummary">
                    <!-- Rating summary will be rendered here -->
                </div>

                <div class="user-rating" id="userRatingSection">
                    <!-- User rating section will be rendered here -->
                </div>

                <div id="ratingsList" class="ratings-list">
                    <!-- All ratings will be rendered here -->
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/ratings.js"></script>
</body>
</html>
