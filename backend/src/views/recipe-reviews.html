<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Reviews</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/reviews.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="reviews-page">
        <nav class="navbar">
            <h2>Recipe Reviews</h2>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/recipes">Recipes</a>
                <a href="/create-recipe">Create Recipe</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/favorites">Favorites</a>
                <a href="/collections">Collections</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>

        <div class="reviews-content">
            <div class="recipe-info" id="recipeInfo">
                <!-- Recipe info will be rendered here -->
            </div>

            <div class="review-section">
                <h3>Reviews</h3>
                
                <div class="create-review" id="createReviewSection">
                    <h4>Write a Review</h4>
                    <form id="reviewForm">
                        <div class="form-group">
                            <textarea id="reviewContent" rows="4" placeholder="Share your thoughts about this recipe..." required></textarea>
                        </div>
                        <div id="reviewMessage" class="success-message"></div>
                        <div id="reviewError" class="error-message"></div>
                        <button type="submit" id="submitReviewBtn">Submit Review</button>
                    </form>
                </div>

                <div id="reviewsList" class="reviews-list">
                    <!-- Reviews will be rendered here -->
                </div>
                
                <div class="pagination" id="pagination">
                    <!-- Pagination will be rendered here -->
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/reviews.js"></script>
</body>
</html>
