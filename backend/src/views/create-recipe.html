<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recipe</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/recipe-form.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="form-page">
        <nav class="navbar">
            <h2>Create New Recipe</h2>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/recipes">Recipes</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/my-favorites">Favorites</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>

        <div class="form-container">
            <div class="form-card">
                <h3>Recipe Details</h3>
                <form id="recipeForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="ingredients">Ingredients *</label>
                        <textarea id="ingredients" rows="6" placeholder="Enter each ingredient on a new line" required></textarea>
                        <small>Enter one ingredient per line</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="instructions">Instructions *</label>
                        <textarea id="instructions" rows="8" placeholder="Enter each step on a new line" required></textarea>
                        <small>Enter one instruction step per line</small>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="prep_time">Prep Time (minutes)</label>
                            <input type="number" id="prep_time" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label for="cook_time">Cook Time (minutes)</label>
                            <input type="number" id="cook_time" min="0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="servings">Servings</label>
                            <input type="number" id="servings" min="1">
                        </div>
                        
                        <div class="form-group">
                            <label for="difficulty">Difficulty</label>
                            <select id="difficulty">
                                <option value="Easy">Easy</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="dietary_preferences">Dietary Preferences</label>
                        <input type="text" id="dietary_preferences" placeholder="e.g., Vegan, Gluten-free (comma separated)">
                    </div>
                    
                    <div class="form-group">
                        <label for="recipeImage">Recipe Image</label>
                        <input type="file" id="recipeImage" accept="image/*">
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="is_public" checked>
                            Make this recipe public
                        </label>
                    </div>
                    
                    <div id="formMessage" class="success-message"></div>
                    <div id="formError" class="error-message"></div>
                    
                    <button type="submit" id="submitBtn">Create Recipe</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/recipe-form.js"></script>
</body>
</html>
