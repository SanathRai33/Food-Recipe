<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection Details</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/collection-detail.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="collection-detail-page">
        <nav class="navbar">
            <h2>Collection</h2>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/recipes">Recipes</a>
                <a href="/create-recipe">Create Recipe</a>
                <a href="/my-recipes">My Recipes</a>
                <a href="/favorites">Favorites</a>
                <a href="/collections">Collections</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>

        <div class="collection-detail-content">
            <div id="collectionDetail" class="collection-detail-card">
                <!-- Collection details will be rendered here -->
            </div>
            
            <div class="collection-actions" id="collectionActions">
                <!-- Edit/Delete buttons for owner -->
            </div>

            <div class="add-recipe-section" id="addRecipeSection">
                <h4>Add Recipe to Collection</h4>
                <div class="add-recipe-form">
                    <input type="number" id="recipeIdInput" placeholder="Enter Recipe ID">
                    <button id="addRecipeBtn" class="btn-add">Add Recipe</button>
                </div>
                <div id="addRecipeMessage" class="success-message"></div>
                <div id="addRecipeError" class="error-message"></div>
            </div>

            <div class="recipes-in-collection">
                <h4>Recipes in this Collection</h4>
                <div id="collectionRecipes" class="recipes-grid"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/collection-detail.js"></script>
</body>
</html>
