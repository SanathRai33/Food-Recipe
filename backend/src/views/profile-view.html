<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/profile.css" />
    <link rel="stylesheet" href="/css/dashboard.css">
  </head>
  <body>
    <div class="profile-container">
      <nav class="navbar">
        <h2>User Profile</h2>
        <div class="nav-links">
          <a href="/dashboard">Dashboard</a>
          <a href="/profile">My Profile</a>
          <button id="logoutBtn">Logout</button>
        </div>
      </nav>

      <div class="public-profile-content">
        <div class="profile-card">
          <h3 id="profileName">User Profile</h3>

          <div class="follow-section" id="followSection">
            <div class="follow-stats">
              <span><strong id="followersCount">0</strong> Followers</span>
              <span><strong id="followingCount">0</strong> Following</span>
            </div>
            <div id="followButtonContainer">
              <!-- Follow button will be rendered here -->
            </div>
          </div>

          <div class="user-details">
            <p><strong>Username:</strong> <span id="displayUsername"></span></p>
            <p>
              <strong>Full Name:</strong> <span id="displayFullName"></span>
            </p>
            <p><strong>Bio:</strong> <span id="displayBio"></span></p>
            <p>
              <strong>Dietary Preferences:</strong>
              <span id="displayDietary"></span>
            </p>
          </div>
          <div class="profile-actions">
            <a href="/user/${userId}/recipes" class="btn">View Recipes</a>
            <a href="/user/${userId}/favorites" class="btn">View Favorites</a>
            <a href="/followers/${userId}" class="btn">Followers</a>
            <a href="/following/${userId}" class="btn">Following</a>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
